<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WiSign Admin</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3e;
    --accent: #6366f1; --accent2: #e94560; --text: #e2e8f0;
    --muted: #64748b; --green: #22c55e; --yellow: #f59e0b; --red: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; display: flex; height: 100vh; overflow: hidden; }
  nav { width: 200px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; }
  nav h1 { font-size: 1.2rem; color: var(--accent); margin-bottom: 1rem; font-weight: 700; letter-spacing: 1px; }
  nav button { background: none; border: none; color: var(--muted); padding: 0.6rem 0.8rem; border-radius: 6px; cursor: pointer; text-align: left; font-size: 0.9rem; transition: all 0.15s; }
  nav button:hover, nav button.active { background: var(--border); color: var(--text); }
  main { flex: 1; overflow-y: auto; padding: 2rem; }
  h2 { font-size: 1.4rem; margin-bottom: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
  .row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .badge { padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
  .badge.online { background: #16532d; color: var(--green); }
  .badge.offline { background: #450a0a; color: var(--red); }
  .badge.degraded { background: #451a00; color: var(--yellow); }
  .muted { color: var(--muted); font-size: 0.85rem; }
  input, textarea, select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.9rem; font-family: inherit; }
  input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); }
  textarea { font-family: 'Courier New', monospace; font-size: 0.8rem; }
  .btn { background: var(--accent); color: #fff; border: none; padding: 0.5rem 1.1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; }
  .btn:hover { opacity: 0.85; }
  .btn.danger { background: var(--red); }
  .btn.secondary { background: var(--border); color: var(--text); }
  .btn.cast { background: #1565c0; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .form-row { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  label { font-size: 0.85rem; color: var(--muted); }
  .section { display: none; }
  .section.active { display: block; }
  .pl-item { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
  .cast-device { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem; background: var(--bg); border-radius: 6px; margin-bottom: 0.5rem; }
  .badge.chromecast { background: #1a3a1a; color: #4ade80; }
  .badge.firetv { background: #3a1a00; color: #fb923c; }
</style>
</head>
<body>
<nav>
  <h1>📺 WiSign</h1>
  <button class="active" onclick="show('screens',this)">🖥 Screens</button>
  <button onclick="show('signs',this)">📄 Signs</button>
  <button onclick="show('assign',this)">🎯 Assign</button>
  <button onclick="show('playlists',this)">🔄 Playlists</button>
  <button onclick="show('cast',this)">📡 Cast</button>
</nav>
<main>

<!-- SCREENS -->
<div id="sec-screens" class="section active">
  <h2>Screens</h2>
  <div id="screens-list" class="grid"></div>
</div>

<!-- SIGNS -->
<div id="sec-signs" class="section">
  <h2>Signs</h2>
  <div class="card" style="margin-bottom:1.5rem">
    <h3 style="margin-bottom:1rem;font-size:1rem">New Sign</h3>
    <div class="form-row"><label>Name</label><input id="new-sign-name" placeholder="Sign name" style="max-width:300px"></div>
    <div class="form-row"><label>Type</label>
      <select id="new-sign-type" onchange="toggleSignType()" style="max-width:200px">
        <option value="raw_html">Raw HTML</option>
        <option value="url">URL</option>
      </select>
    </div>
    <div id="html-field" class="form-row"><label>HTML</label><textarea id="new-sign-html" rows="10" style="width:100%;min-height:200px" placeholder="<!DOCTYPE html>..."></textarea></div>
    <div id="url-field" class="form-row" style="display:none"><label>URL</label><input id="new-sign-url" placeholder="https://example.com" style="width:100%"></div>
    <button class="btn" onclick="createSign()">Create Sign</button>
  </div>
  <div id="signs-list" class="grid"></div>
</div>

<!-- ASSIGN (single sign) -->
<div id="sec-assign" class="section">
  <h2>Assign Sign to Screen</h2>
  <div class="card" style="max-width:500px">
    <div class="form-row"><label>Screen</label><select id="assign-screen" style="width:100%"><option value="all">All Screens</option></select></div>
    <div class="form-row"><label>Sign</label><select id="assign-sign" style="width:100%"></select></div>
    <button class="btn" onclick="doAssign()">Push to Screen →</button>
    <div id="assign-result" style="margin-top:1rem;color:var(--green)"></div>
  </div>
</div>

<!-- PLAYLISTS -->
<div id="sec-playlists" class="section">
  <h2>Playlists</h2>
  <div class="card" style="max-width:640px;margin-bottom:1.5rem">
    <h3 style="margin-bottom:1rem;font-size:1rem">New Playlist</h3>
    <div class="form-row"><label>Name</label><input id="new-pl-name" placeholder="Playlist name" style="max-width:300px"></div>
    <div id="pl-items"></div>
    <div class="row" style="margin-top:0.75rem;gap:0.5rem">
      <button class="btn secondary" onclick="addPlItem()">+ Add Sign</button>
      <button class="btn" onclick="createPlaylist()">Create Playlist</button>
    </div>
  </div>
  <div id="playlists-list" class="grid"></div>
  <div class="card" style="max-width:500px;margin-top:1.5rem">
    <h3 style="margin-bottom:1rem;font-size:1rem">Assign Playlist to Screen</h3>
    <div class="form-row"><label>Screen</label><select id="pl-assign-screen" style="width:100%"><option value="all">All Screens</option></select></div>
    <div class="form-row"><label>Playlist</label><select id="pl-assign-playlist" style="width:100%"></select></div>
    <button class="btn" onclick="doAssignPlaylist()">▶ Start Playlist →</button>
    <div id="pl-assign-result" style="margin-top:1rem;color:var(--green)"></div>
  </div>
</div>

<!-- CAST -->
<div id="sec-cast" class="section">
  <h2>Cast Devices</h2>
  <p class="muted" style="margin-bottom:1rem">Chromecasts and Amazon Fire TVs discovered on your network.</p>
  <div class="card" style="max-width:600px">
    <div id="cast-devices-list"><p class="muted">Scanning...</p></div>
    <button class="btn secondary" style="margin-top:1rem" onclick="loadCastDevices()">🔄 Refresh</button>
  </div>
  <div class="card" style="max-width:500px;margin-top:1rem">
    <h3 style="margin-bottom:1rem;font-size:1rem">Cast a Sign</h3>
    <div class="form-row"><label>Device</label><select id="cast-device" style="width:100%"></select></div>
    <div class="form-row"><label>Sign</label><select id="cast-sign" style="width:100%"></select></div>
    <button class="btn cast" onclick="doCast()">📡 Cast to TV</button>
    <button class="btn secondary" style="margin-left:0.5rem" onclick="doStopCast()">⏹ Stop</button>
    <div id="cast-result" style="margin-top:1rem;color:var(--green)"></div>
  </div>
</div>

</main>
<script>
const g = id => document.getElementById(id);

function show(sec, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  g('sec-' + sec).classList.add('active');
  if (btn) btn.classList.add('active');
  if (sec === 'screens') loadScreens();
  if (sec === 'signs') loadSigns();
  if (sec === 'assign') { loadScreensInto('assign-screen'); loadSignsInto('assign-sign'); }
  if (sec === 'playlists') initPlaylists();
  if (sec === 'cast') { loadCastDevices(); loadSignsInto('cast-sign'); }
}

// ── Screens ───────────────────────────────────────────────────────────────────
async function loadScreens() {
  const screens = await fetch('/api/screens').then(r => r.json());
  const el = g('screens-list');
  if (!screens.length) {
    el.innerHTML = '<p class="muted">No screens registered yet. Connect a player to get started.</p>';
    return;
  }
  el.innerHTML = screens.map(s => `
    <div class="card">
      <div class="row" style="margin-bottom:0.5rem">
        <span class="badge ${s.status}">${s.status}</span>
        <strong>${s.display_name}</strong>
      </div>
      <div class="muted">${s.location || 'No location'} · ${s.platform}</div>
      <div class="muted" style="margin-top:0.25rem">IP: ${s.ip || '—'} · Last seen: ${s.last_seen_at ? new Date(s.last_seen_at + 'Z').toLocaleTimeString() : 'never'}</div>
      ${s.current_assignment ? `<div class="muted" style="margin-top:0.25rem">
        ${s.current_assignment.mode === 'playlist'
          ? `▶ Playlist · sign ${(s.current_assignment.index || 0) + 1}`
          : `Sign: ${s.current_assignment.sign_id || '—'}`}
      </div>` : ''}
    </div>
  `).join('');
}

// ── Signs ─────────────────────────────────────────────────────────────────────
function toggleSignType() {
  const t = g('new-sign-type').value;
  g('html-field').style.display = t === 'raw_html' ? '' : 'none';
  g('url-field').style.display = t === 'url' ? '' : 'none';
}

async function createSign() {
  const name = g('new-sign-name').value.trim();
  const type = g('new-sign-type').value;
  if (!name) return alert('Name required');
  await fetch('/api/signs', { method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, type, html: g('new-sign-html').value, url: g('new-sign-url').value }) });
  g('new-sign-name').value = ''; g('new-sign-html').value = ''; g('new-sign-url').value = '';
  loadSigns();
}

async function loadSigns() {
  const signs = await fetch('/api/signs').then(r => r.json());
  g('signs-list').innerHTML = signs.map(s => `
    <div class="card">
      <div class="row" style="margin-bottom:0.5rem">
        <strong>${s.name}</strong>
        <span class="badge" style="background:var(--border)">${s.type}</span>
      </div>
      <div class="muted">v${s.version} · ${new Date(s.updated_at).toLocaleDateString()}</div>
      <div class="row" style="margin-top:0.75rem;gap:0.5rem">
        <a href="/api/signs/${s.id}/render" target="_blank"><button class="btn secondary" style="font-size:0.8rem">Preview</button></a>
        <button class="btn danger" style="font-size:0.8rem" onclick="deleteSign('${s.id}')">Delete</button>
      </div>
    </div>
  `).join('') || '<p class="muted">No signs yet.</p>';
}

async function deleteSign(id) {
  if (!confirm('Delete this sign?')) return;
  await fetch('/api/signs/' + id, { method: 'DELETE' });
  loadSigns();
}

// ── Assign (single sign) ──────────────────────────────────────────────────────
async function loadScreensInto(elId) {
  const screens = await fetch('/api/screens').then(r => r.json());
  g(elId).innerHTML = '<option value="all">All Screens</option>' +
    screens.map(s => `<option value="${s.id}">${s.display_name} (${s.status})</option>`).join('');
}

async function loadSignsInto(elId) {
  const signs = await fetch('/api/signs').then(r => r.json());
  g(elId).innerHTML = signs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}

async function doAssign() {
  const target_id = g('assign-screen').value;
  const ref_id = g('assign-sign').value;
  if (!ref_id) return alert('Select a sign');
  const res = await fetch('/api/assign', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ target_type: target_id === 'all' ? 'all' : 'screen', target_id, mode: 'sign', ref_id })
  }).then(r => r.json());
  g('assign-result').textContent = res.ok ? `Assigned to ${res.screens_targeted} screen(s)` : res.error;
}

// ── Playlists ─────────────────────────────────────────────────────────────────
let _signs = [];

async function initPlaylists() {
  _signs = await fetch('/api/signs').then(r => r.json());
  if (!g('pl-items').children.length) addPlItem();
  loadPlaylists();
  loadScreensInto('pl-assign-screen');
  loadPlaylistsInto('pl-assign-playlist');
}

function addPlItem() {
  const div = document.createElement('div');
  div.className = 'pl-item';
  const sel = document.createElement('select');
  sel.style.flex = '1';
  sel.innerHTML = _signs.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  const dur = document.createElement('input');
  dur.type = 'number'; dur.value = '10'; dur.min = '1'; dur.style.width = '80px'; dur.title = 'seconds';
  const lbl = document.createElement('span');
  lbl.className = 'muted'; lbl.style.fontSize = '0.8rem'; lbl.textContent = 'sec';
  const btn = document.createElement('button');
  btn.className = 'btn danger'; btn.style.cssText = 'font-size:0.8rem;padding:0.3rem 0.6rem';
  btn.textContent = '✕'; btn.onclick = () => div.remove();
  div.append(sel, dur, lbl, btn);
  g('pl-items').appendChild(div);
}

function getPlItems() {
  return Array.from(g('pl-items').children).map(row => ({
    sign_id: row.querySelector('select').value,
    duration_sec: parseInt(row.querySelector('input').value) || 10
  }));
}

async function createPlaylist() {
  const name = g('new-pl-name').value.trim();
  if (!name) return alert('Name required');
  const items = getPlItems();
  if (!items.length) return alert('Add at least one sign');
  await fetch('/api/playlists', { method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ name, items }) });
  g('new-pl-name').value = '';
  g('pl-items').innerHTML = '';
  addPlItem();
  loadPlaylists();
  loadPlaylistsInto('pl-assign-playlist');
}

async function loadPlaylists() {
  const [lists, signs] = await Promise.all([
    fetch('/api/playlists').then(r => r.json()),
    fetch('/api/signs').then(r => r.json())
  ]);
  const signMap = Object.fromEntries(signs.map(s => [s.id, s.name]));
  g('playlists-list').innerHTML = lists.map(p => `
    <div class="card">
      <div class="row" style="margin-bottom:0.5rem">
        <strong>${p.name}</strong>
        <span class="muted" style="font-size:0.8rem">${p.items.length} sign(s)</span>
      </div>
      <div style="font-size:0.82rem;color:var(--muted);line-height:1.8">
        ${p.items.map((item, i) => `<span>${i + 1}. ${signMap[item.sign_id] || 'Unknown'} <span style="color:var(--accent)">${item.duration_sec}s</span></span>`).join(' → ')}
      </div>
      <div class="row" style="margin-top:0.75rem">
        <button class="btn danger" style="font-size:0.8rem" onclick="deletePlaylist('${p.id}')">Delete</button>
      </div>
    </div>
  `).join('') || '<p class="muted">No playlists yet.</p>';
}

async function loadPlaylistsInto(elId) {
  const lists = await fetch('/api/playlists').then(r => r.json());
  g(elId).innerHTML = lists.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
}

async function deletePlaylist(id) {
  if (!confirm('Delete this playlist?')) return;
  await fetch('/api/playlists/' + id, { method: 'DELETE' });
  loadPlaylists(); loadPlaylistsInto('pl-assign-playlist');
}

async function doAssignPlaylist() {
  const target_id = g('pl-assign-screen').value;
  const ref_id = g('pl-assign-playlist').value;
  if (!ref_id) return alert('Select a playlist');
  const res = await fetch('/api/assign', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ target_type: target_id === 'all' ? 'all' : 'screen', target_id, mode: 'playlist', ref_id })
  }).then(r => r.json());
  g('pl-assign-result').textContent = res.ok
    ? `Playlist started on ${res.screens_targeted} screen(s)`
    : res.error;
}

// ── Cast (Chromecast + Fire TV unified) ───────────────────────────────────────

// Merged device list: { id, name, host, model, status, type }
// type = 'chromecast' | 'firetv'
let _castDevices = [];

async function loadCastDevices() {
  const el = g('cast-devices-list');
  const sel = g('cast-device');

  const [chromecasts, firetvs] = await Promise.all([
    fetch('/api/cast/devices').then(r => r.json()).catch(() => []),
    fetch('/api/fling/devices').then(r => r.json()).catch(() => [])
  ]);

  _castDevices = [
    ...chromecasts.map(d => ({ ...d, type: 'chromecast' })),
    ...firetvs.map(d => ({ ...d, type: 'firetv' }))
  ];

  if (!_castDevices.length) {
    el.innerHTML = '<p class="muted">No Cast devices found. Make sure they are on the same network.</p>';
    sel.innerHTML = '';
    return;
  }

  el.innerHTML = _castDevices.map(d => `
    <div class="cast-device">
      <div>
        <strong>${d.name}</strong>
        <div class="muted">${d.model || d.host} · ${d.host}</div>
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        <span class="badge ${d.type}">${d.type === 'firetv' ? '🔥 Fire TV' : '📺 Chromecast'}</span>
        <span class="badge ${d.status === 'available' ? 'online' : 'offline'}">${d.status}</span>
      </div>
    </div>
  `).join('');

  sel.innerHTML = _castDevices.map(d =>
    `<option value="${d.id}" data-type="${d.type}">${d.name} (${d.type === 'firetv' ? '🔥 Fire TV' : '📺 Chromecast'})</option>`
  ).join('');
}

async function doCast() {
  const sel = g('cast-device');
  const device_id = sel.value;
  const sign_id = g('cast-sign').value;
  if (!device_id || !sign_id) return alert('Select a device and sign');

  const opt = sel.options[sel.selectedIndex];
  const type = opt.dataset.type || 'chromecast';
  const endpoint = type === 'firetv' ? '/api/fling/assign' : '/api/cast/assign';

  const res = await fetch(endpoint, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ device_id, sign_id })
  }).then(r => r.json());

  g('cast-result').textContent = res.ok
    ? `Casting to ${type === 'firetv' ? '🔥 Fire TV' : '📺 Chromecast'}`
    : (res.error || 'Error');
  g('cast-result').style.color = res.ok ? 'var(--green)' : 'var(--red)';
}

async function doStopCast() {
  const sel = g('cast-device');
  const device_id = sel.value;
  if (!device_id) return alert('Select a device first');

  const opt = sel.options[sel.selectedIndex];
  const type = opt.dataset.type || 'chromecast';
  const endpoint = type === 'firetv' ? '/api/fling/stop' : '/api/cast/stop';

  const res = await fetch(endpoint, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ device_id })
  }).then(r => r.json());

  g('cast-result').textContent = res.ok ? 'Stopped' : (res.error || 'Error');
  g('cast-result').style.color = res.ok ? 'var(--muted)' : 'var(--red)';
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadScreens();
setInterval(() => { if (g('sec-screens').classList.contains('active')) loadScreens(); }, 5000);
</script>
</body>
</html>
